<!DOCTYPE html>
<html lang="ja">
<head>

<title>MIND LOG</title>

<link rel="apple-touch-icon" href="./icon-192.png" />

<style>
:root{
  --bg:#F4F0F2; --surface:#FFFFFF; --surface2:#FBF8FA;
  --ink:#2C2A2E; --sub:#8C8390; --line:#EAE2E8;
  --accent:#A8477C; --accent-d:#8E3A68; --accent-soft:#F4E7EF;
  --danger:#B5564A;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg);color:var(--ink);
  font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;
  font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;
}
button{font:inherit;border:none;background:none;color:inherit;cursor:pointer}
input,textarea{font:inherit;color:var(--ink);background:none;border:none;outline:none}
img,video{display:block;max-width:100%}

.app{max-width:520px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;
  background:var(--bg);position:relative;overflow-x:hidden}

/* appbar */
.appbar{position:sticky;top:0;z-index:30;display:flex;align-items:baseline;gap:8px;
  padding:14px 16px 12px;background:rgba(244,240,242,.92);backdrop-filter:saturate(1.4) blur(8px);
  border-bottom:1px solid var(--line)}
.brand{font-weight:800;font-size:18px;letter-spacing:.04em;color:var(--accent)}
.sub{font-size:11.5px;color:var(--sub);letter-spacing:.02em}
.gear{margin-left:auto;color:var(--sub);padding:4px;align-self:center}

.main{flex:1;padding-bottom:78px}
.view{padding:10px 12px 24px}

/* composer */
.composer{background:var(--surface);border:1px solid var(--line);border-radius:18px;
  padding:12px 14px;margin-bottom:14px;box-shadow:0 1px 2px rgba(60,40,55,.03)}
.cinput{width:100%;resize:none;min-height:46px;line-height:1.6;font-size:16px;
  padding:4px 2px;max-height:360px}
.cinput::placeholder{color:#B7AEB6}
.attrow{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 4px}
.att{position:relative;width:78px;height:78px;border-radius:12px;overflow:hidden;
  border:1px solid var(--line);background:var(--surface2)}
.attmedia{width:100%;height:100%;object-fit:cover}
.attx{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;
  background:rgba(20,12,18,.6);color:#fff;display:flex;align-items:center;justify-content:center}
.cbar{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.ctools{display:flex;gap:2px}
.tool{color:var(--accent);padding:7px;border-radius:10px}
.tool:active{background:var(--accent-soft)}
.post{display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:#fff;
  font-weight:700;font-size:14px;padding:9px 18px;border-radius:999px}
.post:disabled{background:#D9C6D2;color:#fff}
.post:active:not(:disabled){background:var(--accent-d)}

/* day group + card */
.daygroup{margin-bottom:6px}
.dayhead{font-size:12px;font-weight:700;color:var(--sub);letter-spacing:.04em;
  padding:10px 6px 6px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;
  padding:12px 14px;margin-bottom:10px}
.card.pad{padding:16px 16px 18px}
.cardhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;gap:8px}
.cardact{display:flex;align-items:center;gap:1px;flex-shrink:0}
.iconbtn{color:#C5BAC2;padding:5px;border-radius:8px}
.iconbtn:active{background:var(--accent-soft);color:var(--accent)}
.iconbtn.fav.on{color:#D9A521}
.iconbtn.del:active{color:var(--danger);background:#F7ECEC}
.edited{color:var(--sub);font-size:11px;margin-left:2px}
.editbox{background:var(--surface2);border:1px dashed var(--accent-soft);border-radius:12px;padding:10px 12px;margin:-2px 0}
.editlabel{font-size:11px;font-weight:700;color:var(--accent-d);margin-bottom:4px}
.editbar{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.ebtns{display:flex;gap:8px;align-items:center}
.ecancel{font-size:13px;color:var(--sub);padding:9px 12px;border-radius:999px}
.ecancel:active{background:var(--line)}
.attmedia.ph{background:var(--surface2)}
.time{font-size:11.5px;color:var(--sub)}
.ptext{white-space:pre-wrap;word-break:break-word;font-size:15.5px;line-height:1.7}
.ptext.clamp{display:-webkit-box;-webkit-line-clamp:12;-webkit-box-orient:vertical;overflow:hidden}
.ptext mark{background:#FBE3B9;color:inherit;border-radius:3px;padding:0 1px}
.more{color:var(--accent);font-size:13px;font-weight:600;margin-top:4px;padding:2px 0}

/* media */
.mblock{margin-top:10px;display:flex;flex-direction:column;gap:8px}
.mgrid{display:grid;gap:6px;border-radius:14px;overflow:hidden}
.mgrid.n1{grid-template-columns:1fr}
.mgrid.n2{grid-template-columns:1fr 1fr}
.mgrid.n3,.mgrid.n4{grid-template-columns:1fr 1fr}
.mimg{width:100%;border-radius:14px;background:var(--surface2)}
.mimg.th{height:160px;object-fit:cover;border-radius:0}
.mgrid .mimg.th{cursor:zoom-in}
.mgrid.n1 .mimg{border-radius:14px}
.mvid{width:100%;border-radius:14px;background:#000;max-height:70vh}
.mph{width:100%;height:160px;background:var(--surface2);border-radius:14px}
.mph.th{border-radius:0}

/* empty */
.empty{text-align:center;color:var(--sub);padding:54px 20px;display:flex;
  flex-direction:column;align-items:center;gap:8px}
.empty svg{color:#D7C4D0}
.empty p{font-weight:600;color:var(--ink);font-size:15px;margin-top:4px}
.empty span{font-size:12.5px}
.emptysm{text-align:center;color:var(--sub);font-size:13px;padding:30px 18px}

/* calendar */
.calhead{display:flex;align-items:center;justify-content:space-between;
  padding:4px 2px 12px}
.caltitle{font-weight:800;font-size:16px;letter-spacing:.03em}
.navbtn{color:var(--sub);padding:6px;border-radius:10px}
.navbtn:active{background:var(--accent-soft);color:var(--accent)}
.calcard{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:8px}
.calwk{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:52px;gap:3px;width:100%}
.calwd{text-align:center;font-size:11px;color:var(--sub);padding:2px 0;font-weight:600}
.calwd.sun{color:#C06A6A}.calwd.sat{color:#6A86C0}
.calcell{position:relative;min-width:0;border-radius:10px;display:flex;
  align-items:center;justify-content:center;font-size:13.5px;color:var(--ink)}
.calcell.empty{visibility:hidden}
.calcell.today{outline:1.5px solid var(--accent-soft)}
.calcell.sel{background:var(--accent);color:#fff;font-weight:700}
.calcell .cd{line-height:1}
.calcell.sat .cd{color:#6A86C0}
.calcell.sun .cd{color:#C06A6A}
.calcell.sel .cd{color:#fff}
.cdot{position:absolute;bottom:5px;min-width:13px;height:13px;border-radius:7px;
  background:var(--accent-soft);color:var(--accent-d);font-size:9px;font-weight:800;
  display:flex;align-items:center;justify-content:center;padding:0 3px}
.calcell.sel .cdot{background:rgba(255,255,255,.32);color:#fff}
.seldate{font-size:12.5px;font-weight:700;color:var(--sub);padding:16px 6px 8px}

/* search */
.searchbar{display:flex;align-items:center;gap:8px;background:var(--surface);
  border:1px solid var(--line);border-radius:999px;padding:10px 14px;margin-bottom:12px}
.sinput{flex:1;font-size:15px}
.clr{color:var(--sub);display:flex}
.rescount{font-size:12px;color:var(--sub);padding:2px 6px 8px}

/* analyze */
.secttl{font-weight:800;font-size:15px;margin-bottom:10px}
.secttl2{font-weight:800;font-size:13px;color:var(--sub);padding:14px 6px 8px}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
.chip{font-size:13px;padding:7px 13px;border-radius:999px;background:var(--surface2);
  border:1px solid var(--line);color:var(--sub);font-weight:600}
.chip.on{background:var(--accent-soft);border-color:transparent;color:var(--accent-d)}
.daterow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.dpfield{flex:1;background:var(--surface2);border:1px solid var(--line);border-radius:10px;
  padding:11px 10px;font-size:15px;color:var(--ink);text-align:center;font-variant-numeric:tabular-nums}
.dpfield:active{border-color:var(--accent)}
.tilde{color:var(--sub)}
.rangeinfo{font-size:12.5px;color:var(--sub);margin-bottom:10px}
.runbtn{width:100%;background:var(--accent);color:#fff;font-weight:700;font-size:15px;
  padding:13px;border-radius:13px}
.runbtn:disabled{background:#D9C6D2}
.runbtn:active:not(:disabled){background:var(--accent-d)}
.hint{font-size:11.5px;color:var(--sub);margin-top:10px;line-height:1.6}
.errbox{background:#F7ECEC;color:var(--danger);font-size:12.5px;padding:9px 11px;
  border-radius:10px;margin-bottom:10px;word-break:break-word}
.anahead{width:100%;display:flex;align-items:center;justify-content:space-between;text-align:left}
.anaperiod{font-weight:700;font-size:14px;font-variant-numeric:tabular-nums}
.anameta{font-size:11.5px;color:var(--sub);margin-top:2px}
.anabody{margin-top:10px;border-top:1px solid var(--line);padding-top:10px}
.mdh{font-size:14px;color:var(--accent-d);margin:12px 0 4px}
.mdp{font-size:14px;line-height:1.75;margin:3px 0}
.mdli{font-size:14px;line-height:1.7;padding-left:16px;position:relative;margin:2px 0}
.mdli:before{content:"・";position:absolute;left:2px;color:var(--accent)}
.mdsp{height:6px}
.del.small{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--sub);
  margin-top:8px;padding:5px 8px;border-radius:8px}
.del.small:active{background:#F7ECEC;color:var(--danger)}

/* date-pick sheet */
.dpsheet{width:100%;max-width:380px;background:var(--bg);border-radius:18px;
  padding:14px 14px 18px;margin:auto;animation:up .18s ease}
.sheetwrap.dpwrap{align-items:center}
.dpsheet .calgrid{grid-auto-rows:44px}
.dpsheet .calcell{font-size:14px}
.dpsheet .calcard{border:none;padding:4px 0 0}

/* tab bar */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;
  display:flex;background:rgba(255,255,255,.94);backdrop-filter:blur(10px);
  border-top:1px solid var(--line);padding:6px 4px calc(6px + env(safe-area-inset-bottom));z-index:30}
.tab{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:2px;
  color:var(--sub);font-size:10px;font-weight:600;padding:5px 0;border-radius:12px}
.tab span{white-space:nowrap;letter-spacing:-.01em}
.tab.on{color:var(--accent)}

/* settings sheet */
.sheetwrap{position:fixed;inset:0;z-index:50;background:rgba(30,20,28,.4);
  display:flex;align-items:flex-end;justify-content:center}
.sheet{width:100%;max-width:520px;background:var(--bg);border-radius:20px 20px 0 0;
  padding:18px 18px calc(28px + env(safe-area-inset-bottom));max-height:88vh;overflow:auto;
  animation:up .22s ease}
@keyframes up{from{transform:translateY(20px);opacity:.6}to{transform:none;opacity:1}}
.sheethead{display:flex;align-items:center;justify-content:space-between;
  font-weight:800;font-size:16px;margin-bottom:16px}
.sgroup{background:var(--surface);border:1px solid var(--line);border-radius:14px;
  padding:14px;margin-bottom:12px;display:flex;flex-direction:column;gap:9px}
.slabel{font-size:12.5px;font-weight:700;color:var(--sub)}
.tinput{background:var(--surface2);border:1px solid var(--line);border-radius:10px;
  padding:11px 12px;font-size:15px}
.sbtn{background:var(--accent);color:#fff;font-weight:700;font-size:14px;
  padding:11px;border-radius:11px}
.sbtn:active{background:var(--accent-d)}
.sbtn.ghost{background:var(--surface2);color:var(--accent-d);border:1px solid var(--line)}
.sbtn.danger{background:var(--surface);color:var(--danger);border:1px solid #ECD6D3}
.snote{font-size:11px;color:var(--sub);line-height:1.6}
.smsg{text-align:center;font-size:12.5px;color:var(--accent-d);
  background:var(--accent-soft);padding:9px;border-radius:10px;margin-bottom:10px}
.sver{text-align:center;font-size:11px;color:var(--sub);margin-top:6px}

/* lightbox */
.lightbox{position:fixed;inset:0;z-index:60;background:rgba(12,8,12,.94);
  display:flex;align-items:center;justify-content:center;padding:16px}
.lightbox img{max-width:100%;max-height:100%;border-radius:8px}
.lbx{position:absolute;top:14px;right:14px;color:#fff;padding:6px}

</style>

/* ============ IndexedDB ============ */
const DB_NAME = "mindlog";
const DB_VER = 1;
let _db = null;
function openDB() {
  return new Promise((res, rej) => {
    if (_db) return res(_db);
    const r = indexedDB.open(DB_NAME, DB_VER);
    r.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains("posts")) {
        const s = db.createObjectStore("posts", {
          keyPath: "id"

        s.createIndex("createdAt", "createdAt");
      }
      if (!db.objectStoreNames.contains("media")) {
        db.createObjectStore("media", {
          keyPath: "id"

async function dbGetAllPosts() {
  const s = await store("posts", "readonly");
  const all = await reqP(s.getAll());
  return all.sort((a, b) => b.createdAt - a.createdAt);
}
async function dbPutPost(p) {
  (await store("posts", "readwrite")).put(p);
}
async function dbDeletePost(id) {
  (await store("posts", "readwrite")).delete(id);
}
async function dbPutMedia(id, blob) {
  (await store("media", "readwrite")).put({
    id,
    blob
  });
}
async function dbGetMedia(id) {
  return reqP((await store("media", "readonly")).get(id));
}
async function dbDeleteMedia(id) {
  (await store("media", "readwrite")).delete(id);
}

/* media url cache */
const urlCache = new Map();
async function getMediaUrl(id) {
  if (urlCache.has(id)) return urlCache.get(id);
  const rec = await dbGetMedia(id);
  if (!rec) return null;
  const url = URL.createObjectURL(rec.blob);
  urlCache.set(id, url);
  return url;
}
function dropMediaUrl(id) {
  if (urlCache.has(id)) {
    URL.revokeObjectURL(urlCache.get(id));
    urlCache.delete(id);
  }
}
